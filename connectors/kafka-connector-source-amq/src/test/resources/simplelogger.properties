# Test logging (slf4j-simple).
org.slf4j.simpleLogger.defaultLogLevel=info
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS
# Artemis audit logging calls javax.security.auth.Subject.getSubject, which is unsupported on
# JDK 24+; it must stay disabled for the embedded test broker to start.
org.slf4j.simpleLogger.log.org.apache.activemq.audit=off
